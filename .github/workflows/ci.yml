name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'CMakeLists.txt'
              - 'CMakePresets.json'
              - '.github/workflows/ci.yml'
              - 'src/**'
              - 'include/**'
              - 'tests/**'
              - 'examples/**'
              - '**/*.c'
              - '**/*.cpp'
              - '**/*.h'
              - '**/*.hpp'

  # -------------------------
  # Native Ubuntu Build
  # -------------------------
  build-ubuntu:
    name: Build (Ubuntu 22.04)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc g++

      - name: Configure
        run: cmake --preset dev

      - name: Build
        run: cmake --build --preset dev

      - name: Test
        run: ctest --preset dev

  # -------------------------
  # Debian Trixie (Container)
  # -------------------------
  build-debian-trixie:
    name: Build (Debian Trixie Container)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    container:
      image: debian:trixie

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Debian Trixie)
        run: |
          apt-get update
          apt-get install -y cmake ninja-build gcc g++

      - name: Configure
        run: cmake --preset dev

      - name: Build
        run: cmake --build --preset dev

      - name: Test
        run: ctest --preset dev

  # -------------------------
  # Native ARM64 Build (GitHub ARM64 runner)
  # -------------------------
  build-arm64:
    name: Build (ARM64)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-22.04-arm

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc g++ libc6-dev

      - name: Configure
        run: cmake --preset dev

      - name: Build
        run: cmake --build --preset dev

      - name: Test
        run: ctest --preset dev

  # ─── Unified gate ─────────────────────────────────────────────────────────
  # Branch protection requires only: CI / ok
  ok:
    name: ok
    if: always()
    needs: [changes, build-ubuntu, build-debian-trixie, build-arm64]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any upstream job failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - name: Pass
        run: echo 'All checks passed or were skipped'
